<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jadeer — Smart CV Authenticator & Advisor</title>
  <meta name="description" content="Jadeer: Authentic. Verified. Career-Ready.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
  <div id="app-root">
    <div class="page-loader"><div class="spinner"></div></div>
  </div>

  <!-- Foundation -->
  <script src="js/config.js?v=2"></script>
  <script src="js/warmup.js?v=2"></script>
  <script src="js/api.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
  <script src="js/i18n.js?v=2"></script>
  <script src="js/ui.js?v=2"></script>
  <script src="js/router.js?v=2"></script>
  <script src="js/shell.js?v=2"></script>
  <script src="js/i18n-profile.js?v=2"></script>
  <script src="js/i18n-skills-certificates.js?v=2"></script>
  <script src="js/i18n-recommendations-cv.js?v=2"></script>

  <!-- Pages -->
  <script src="js/pages/auth.js?v=2"></script>
  <script src="js/pages/onboarding.js?v=2"></script>
  <script src="js/pages/dashboard.js?v=2"></script>
  <script src="js/pages/profile-view.js?v=2"></script>
  <script src="js/pages/profile-edit.js?v=2"></script>
  <script src="js/pages/skills.js?v=2"></script>
  <script src="js/pages/certificates.js?v=2"></script>
  <script src="js/pages/recommendations.js?v=2"></script>
  <script src="js/pages/cvs.js?v=2"></script>
  <script src="js/pages/chats.js?v=2"></script>
  <script src="js/i18n-employer.js?v=2"></script>
  <script src="js/pages/employer-onboarding.js?v=2"></script>
  <script src="js/pages/employer-profile.js?v=2"></script>
  <script src="js/pages/employer-search.js?v=2"></script>
  <script src="js/pages/stubs.js?v=2"></script>

  <!-- Boot -->
  <script>
    (function boot(){
      // Default route
      if(!location.hash){
        location.hash = window.JadeerAPI.getToken()
          ? (window.JadeerAuth.currentRole()==='employer' ? '#/employer' : '#/dashboard')
          : '#/login';
      }
      window.JadeerRouter.render();
    })();
  </script>
</body>
</html>
