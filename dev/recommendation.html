<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recommendations — Jadeer</title>
  <style>
    .result-section { margin-bottom: 20px; }
    .result-section-title {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #64748b; margin-bottom: 10px;
    }
    .result-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: flex; flex-direction: column;
      padding: 10px 14px; border-radius: 8px;
      border: 1px solid; font-size: 13px; max-width: 280px;
    }
    .chip-name { font-weight: 600; margin-bottom: 2px; }
    .chip-desc { font-size: 12px; opacity: 0.8; }
    .chip-match { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }
    .chip-exp { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .chip-cert { background: #fefce8; border-color: #fef08a; color: #854d0e; }
    .chip-dev { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
    .keyword-box {
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px;
      min-height: 44px; cursor: text;
    }
    .keyword-box input {
      border: none; outline: none; flex: 1; min-width: 120px;
      font-size: 13px; padding: 2px 4px; box-shadow: none !important;
    }
    .kw-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; background: #eef2ff; color: #4f46e5;
      border-radius: 6px; font-size: 12px; font-weight: 500;
    }
    .kw-remove { cursor: pointer; opacity: 0.6; }
    .kw-remove:hover { opacity: 1; }
    .bio-output {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 16px; font-size: 14px; line-height: 1.7; color: #1e293b;
      white-space: pre-wrap; min-height: 80px;
    }
    .copy-row { display: flex; justify-content: flex-end; margin-top: 8px; }
    .score-bar-wrap {
      display: flex; align-items: center; gap: 12px; margin-top: 8px;
    }
    .score-bar-bg {
      flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden;
    }
    .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .score-val { font-size: 13px; font-weight: 700; min-width: 36px; text-align: right; }
  </style>
</head>
<body>
  <div class="main">
    <div class="page-header">
      <div class="page-title">Recommendations</div>
      <div class="page-subtitle">Analyze your profile against job requirements or generate a professional bio</div>
    </div>

    <div class="tabs" id="recTabs">
      <div class="tab active" data-tab="analyze" onclick="switchTab('recTabs','rec-','analyze')">Job Analyzer</div>
      <div class="tab" data-tab="bio" onclick="switchTab('recTabs','rec-','bio')">Bio Generator</div>
    </div>

    <!-- Job Analyzer -->
    <div class="tab-pane active" id="rec-analyze">
      <div class="card">
        <div class="card-title">Job Description</div>
        <div class="form-group">
          <textarea id="jobDesc" rows="8" placeholder="Paste the full job description here..."></textarea>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">Analyze</button>
        </div>
        <div class="alert alert-error" id="analyzeErr"></div>
      </div>

      <div id="analysisResult" style="display:none">
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <div class="card-title" style="margin-bottom:0">Analysis Results</div>
            <div id="overallScore"></div>
          </div>

          <div class="result-section" id="sec_matching_skills" style="display:none">
            <div class="result-section-title">✅ Matching Skills</div>
            <div class="result-chips" id="chips_matching_skills"></div>
          </div>

          <div class="result-section" id="sec_matching_experiences" style="display:none">
            <div class="result-section-title">💼 Relevant Experience</div>
            <div class="result-chips" id="chips_matching_experiences"></div>
          </div>

          <div class="result-section" id="sec_matching_certifications" style="display:none">
            <div class="result-section-title">🏆 Matching Certifications</div>
            <div class="result-chips" id="chips_matching_certifications"></div>
          </div>

          <div class="result-section" id="sec_areas_for_development" style="display:none">
            <div class="result-section-title">📈 Areas for Development</div>
            <div class="result-chips" id="chips_areas_for_development"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bio Generator -->
    <div class="tab-pane" id="rec-bio">
      <div class="card">
        <div class="card-title">Bio Generator</div>
        <div class="form-group">
          <label>Keywords to include (press Enter or comma to add)</label>
          <div class="keyword-box" id="kwBox" onclick="document.getElementById('kwInput').focus()">
            <input type="text" id="kwInput" placeholder="leadership, Python, fintech..." onkeydown="addKeyword(event)" />
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="bioBtn" onclick="generateBio()">Generate Bio</button>
        </div>
        <div class="alert alert-error" id="bioErr"></div>
      </div>

      <div id="bioResult" style="display:none">
        <div class="card">
          <div class="card-title">Generated Bio</div>
          <div class="bio-output" id="bioOutput"></div>
          <div class="copy-row">
            <button class="btn btn-ghost btn-sm" onclick="copyBio()">Copy to clipboard</button>
            <a href="/dev/cv.html" class="btn btn-ghost btn-sm" style="margin-left:6px">Use in CV Builder →</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/dev/_shared.js"></script>
  <script>
    initPage('rec');

    // ── Keywords ──────────────────────────────────────────────────────────────
    let keywords = [];

    function renderKeywords() {
      const box = document.getElementById('kwBox');
      box.querySelectorAll('.kw-tag').forEach(t => t.remove());
      keywords.forEach((kw, i) => {
        const span = document.createElement('span');
        span.className = 'kw-tag';
        span.innerHTML = `${kw} <span class="kw-remove" onclick="removeKeyword(${i})">×</span>`;
        box.insertBefore(span, document.getElementById('kwInput'));
      });
    }

    function addKeyword(e) {
      if (e.key !== 'Enter' && e.key !== ',') return;
      e.preventDefault();
      const val = document.getElementById('kwInput').value.replace(',', '').trim();
      if (val && !keywords.includes(val)) { keywords.push(val); renderKeywords(); }
      document.getElementById('kwInput').value = '';
    }

    function removeKeyword(i) { keywords.splice(i, 1); renderKeywords(); }

    // ── Analyze ───────────────────────────────────────────────────────────────
    async function analyze() {
      const jd = document.getElementById('jobDesc').value.trim();
      if (!jd) return showAlert('analyzeErr', 'Please enter a job description');

      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Analyzing...';
      document.getElementById('analysisResult').style.display = 'none';
      document.getElementById('analyzeErr').className = 'alert alert-error';

      try {
        const res = await api('/recommendation/analyze', {
          method: 'POST',
          body: JSON.stringify({ job_description: jd }),
        });
        if (!res || !res.ok) {
          const err = await res?.json().catch(() => ({}));
          showAlert('analyzeErr', err.detail || err.error || 'Analysis failed');
          return;
        }
        const data = await res.json();
        renderAnalysis(data);
      } finally {
        btn.disabled = false; btn.textContent = 'Analyze';
      }
    }

    const CHIP_CLASSES = {
      matching_skills: 'chip-match',
      matching_experiences: 'chip-exp',
      matching_certifications: 'chip-cert',
      areas_for_development: 'chip-dev',
    };

    function renderAnalysis(data) {
      const result = data.result || data;

      // Overall score
      const scoreEl = document.getElementById('overallScore');
      if (result.overall_match_score != null) {
        const score = result.overall_match_score;
        const color = score >= 70 ? '#16a34a' : score >= 40 ? '#ca8a04' : '#dc2626';
        scoreEl.innerHTML = `
          <div style="text-align:right">
            <div style="font-size:24px;font-weight:800;color:${color}">${score}%</div>
            <div style="font-size:12px;color:#64748b">match</div>
          </div>`;
      } else {
        scoreEl.innerHTML = '';
      }

      const sections = ['matching_skills', 'matching_experiences', 'matching_certifications', 'areas_for_development'];
      sections.forEach(key => {
        const items = result[key] || [];
        const sec = document.getElementById(`sec_${key}`);
        const chips = document.getElementById(`chips_${key}`);
        if (!items.length) { sec.style.display = 'none'; return; }
        sec.style.display = '';
        chips.innerHTML = items.map(item => {
          const name = item.name || item;
          const desc = item.description || '';
          return `<div class="chip ${CHIP_CLASSES[key]}">
            <div class="chip-name">${name}</div>
            ${desc ? `<div class="chip-desc">${desc}</div>` : ''}
          </div>`;
        }).join('');
      });

      document.getElementById('analysisResult').style.display = '';
    }

    // ── Bio ───────────────────────────────────────────────────────────────────
    async function generateBio() {
      const btn = document.getElementById('bioBtn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Generating...';
      document.getElementById('bioResult').style.display = 'none';
      document.getElementById('bioErr').className = 'alert alert-error';

      try {
        const res = await api('/recommendation/generate-bio', {
          method: 'POST',
          body: JSON.stringify({ keywords }),
        });
        if (!res || !res.ok) {
          const err = await res?.json().catch(() => ({}));
          showAlert('bioErr', err.detail || err.error || 'Generation failed');
          return;
        }
        const data = await res.json();
        document.getElementById('bioOutput').textContent = data.bio || 'No bio generated';
        document.getElementById('bioResult').style.display = '';
      } finally {
        btn.disabled = false; btn.textContent = 'Generate Bio';
      }
    }

    function copyBio() {
      const text = document.getElementById('bioOutput').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy to clipboard', 2000);
      });
    }
  </script>
</body>
</html>
