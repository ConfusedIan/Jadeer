<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recommendation Service Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #f1f5f9;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      background: #0f172a;
      color: white;
      padding: 0 16px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar strong { font-size: 14px; white-space: nowrap; }
    .topbar input {
      flex: 1;
      max-width: 520px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-family: monospace;
      background: rgba(255,255,255,0.12);
      color: white;
    }
    .topbar input::placeholder { color: rgba(255,255,255,0.4); }
    .topbar input:focus { outline: 2px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.2); }
    .nav-link {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.2);
      white-space: nowrap;
    }
    .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }

    .split {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .panel {
      width: 380px;
      flex-shrink: 0;
      background: white;
      border-right: 1px solid #e2e8f0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sec-head {
      padding: 8px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      border-top: 1px solid #e2e8f0;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #475569;
    }

    .sec-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

    label.lbl { display: block; font-size: 11px; font-weight: 600; color: #475569; margin-bottom: 3px; }
    .hint { font-size: 11px; color: #94a3b8; font-weight: 400; }

    textarea, input[type=text] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      color: #1e293b;
      background: white;
    }
    textarea { resize: vertical; min-height: 100px; }
    textarea:focus, input:focus { outline: 2px solid #4f46e5; border-color: #4f46e5; }

    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { filter: brightness(0.92); }
    .btn-dark   { background: #0f172a; color: white; }
    .btn-purple { background: #7c3aed; color: white; }

    /* ── Right panel (results) ── */
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #94a3b8;
      text-align: center;
    }
    .empty-state .ico { font-size: 40px; }

    /* ── Result cards ── */
    .result-section {
      background: white;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }
    .result-head {
      padding: 10px 14px;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #e2e8f0;
    }
    .result-head.blue   { background: #eff6ff; color: #1d4ed8; border-left: 3px solid #3b82f6; }
    .result-head.purple { background: #f5f3ff; color: #6d28d9; border-left: 3px solid #7c3aed; }
    .result-head.green  { background: #f0fdf4; color: #15803d; border-left: 3px solid #22c55e; }
    .result-head.orange { background: #fff7ed; color: #c2410c; border-left: 3px solid #f97316; }

    .result-item {
      padding: 10px 14px;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .result-item:last-child { border-bottom: none; }
    .item-name { font-weight: 600; font-size: 12px; }
    .item-desc { font-size: 12px; color: #475569; margin-top: 2px; line-height: 1.5; }
    .item-meta { font-size: 11px; color: #94a3b8; margin-top: 1px; }
    .dot-icon { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot-blue   { background: #3b82f6; }
    .dot-purple { background: #7c3aed; }
    .dot-green  { background: #22c55e; }
    .dot-orange { background: #f97316; }

    /* bio result */
    .bio-result {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px;
      font-size: 13px;
      line-height: 1.7;
      color: #1e293b;
      border-left: 3px solid #7c3aed;
    }
    .bio-result .bio-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #7c3aed;
      margin-bottom: 8px;
    }

    .job-title-banner {
      background: #0f172a;
      color: white;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
    }
    .job-title-banner span { font-size: 11px; font-weight: 400; opacity: 0.6; display: block; margin-bottom: 2px; }

    .status {
      flex-shrink: 0;
      padding: 5px 14px;
      background: white;
      border-top: 1px solid #e2e8f0;
      font-size: 11px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sdot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; }
    .sdot.ok   { background: #22c55e; }
    .sdot.err  { background: #ef4444; }
    .sdot.busy { background: #f59e0b; animation: blink .7s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>

<div class="topbar">
  <strong>Recommendation Tester</strong>
  <input type="text" id="token" placeholder="Paste your Supabase JWT here…" />
  <a class="nav-link" href="/dev/">← CV Tester</a>
</div>

<div class="split">

  <!-- Left: inputs -->
  <div class="panel">

    <div class="sec-head">Analyze Profile vs Job</div>
    <div class="sec-body">
      <div>
        <label class="lbl">Job Description</label>
        <textarea id="jobDesc" placeholder="Paste the full job description here…"></textarea>
      </div>
      <button class="btn btn-dark" onclick="doAnalyze()">Analyze</button>
    </div>

    <div class="sec-head">Generate AI Bio</div>
    <div class="sec-body">
      <div>
        <label class="lbl">Keywords <span class="hint">comma-separated (optional)</span></label>
        <input type="text" id="bioKw" placeholder="e.g. cloud, team lead, problem solver" />
      </div>
      <button class="btn btn-purple" onclick="doGenerateBio()">Generate Bio</button>
    </div>

  </div>

  <!-- Right: results -->
  <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <div class="results" id="results">
      <div class="empty-state">
        <div class="ico">🤖</div>
        <p>Paste a job description and click <strong>Analyze</strong><br>to see AI recommendations.</p>
      </div>
    </div>
    <div class="status">
      <div class="sdot" id="sdot"></div>
      <span id="smsg">Idle</span>
    </div>
  </div>

</div>

<script>
function tok() { return document.getElementById('token').value.trim(); }
function authH(extra = {}) {
  const h = { ...extra };
  const t = tok();
  if (t) h['Authorization'] = 'Bearer ' + t;
  return h;
}
function setStatus(state, msg) {
  document.getElementById('sdot').className = 'sdot ' + state;
  document.getElementById('smsg').textContent = msg;
}

// ── Analyze ─────────────────────────────────────────────────────────────────
async function doAnalyze() {
  const jd = document.getElementById('jobDesc').value.trim();
  if (!jd) { alert('Paste a job description first.'); return; }
  if (!tok()) { alert('Paste your JWT token first.'); return; }

  setStatus('busy', 'Analyzing…');
  document.getElementById('results').innerHTML = '<div class="empty-state"><div class="ico">⏳</div><p>Analyzing your profile…</p></div>';

  try {
    const res = await fetch('/recommendation/analyze', {
      method: 'POST',
      headers: authH({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ job_description: jd }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data); setStatus('err', `Error ${res.status}`); return; }
    renderResults(data);
    setStatus('ok', `Done — analyzed for: ${data.job_title || 'role'}`);
  } catch(e) { showError(String(e)); setStatus('err', 'Network error'); }
}

// ── Generate Bio ─────────────────────────────────────────────────────────────
async function doGenerateBio() {
  if (!tok()) { alert('Paste your JWT token first.'); return; }
  setStatus('busy', 'Generating bio…');

  const kw = document.getElementById('bioKw').value.split(',').map(k => k.trim()).filter(Boolean);

  try {
    const res = await fetch('/recommendation/generate-bio', {
      method: 'POST',
      headers: authH({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ keywords: kw }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data); setStatus('err', `Error ${res.status}`); return; }
    renderBio(data.bio || '');
    setStatus('ok', 'Bio generated');
  } catch(e) { showError(String(e)); setStatus('err', 'Network error'); }
}

// ── Render analysis results ──────────────────────────────────────────────────
function renderResults(d) {
  const r = document.getElementById('results');
  r.innerHTML = '';

  // Job title banner
  if (d.job_title) {
    r.innerHTML += `<div class="job-title-banner"><span>Analyzing for</span>${d.job_title}</div>`;
  }

  // Relevant Skills
  if (d.relevant_skills?.length) {
    r.innerHTML += `
      <div class="result-section">
        <div class="result-head blue">✓ Relevant Skills</div>
        ${d.relevant_skills.map(s => `
          <div class="result-item">
            <div class="dot-icon dot-blue"></div>
            <div><div class="item-name">${s.name}</div><div class="item-desc">${s.description || s.reason || ''}</div></div>
          </div>`).join('')}
      </div>`;
  }

  // Matching Experiences
  if (d.matching_experiences?.length) {
    r.innerHTML += `
      <div class="result-section">
        <div class="result-head purple">💼 Matching Experience</div>
        ${d.matching_experiences.map(e => `
          <div class="result-item">
            <div class="dot-icon dot-purple"></div>
            <div>
              <div class="item-name">${e.job_title} — ${e.company}</div>
              <div class="item-meta">${e.duration || ''}</div>
              <div class="item-desc">${e.description || e.reason || ''}</div>
            </div>
          </div>`).join('')}
      </div>`;
  }

  // Recommended Certifications
  if (d.recommended_certifications?.length) {
    r.innerHTML += `
      <div class="result-section">
        <div class="result-head green">🎓 Recommended Certifications</div>
        ${d.recommended_certifications.map(c => `
          <div class="result-item">
            <div class="dot-icon dot-green"></div>
            <div><div class="item-name">${c.name}</div><div class="item-desc">${c.description || c.reason || ''}</div></div>
          </div>`).join('')}
      </div>`;
  }

  // Areas for Development
  if (d.areas_for_development?.length) {
    r.innerHTML += `
      <div class="result-section">
        <div class="result-head orange">⚠ Areas for Development</div>
        ${d.areas_for_development.map(a => `
          <div class="result-item">
            <div class="dot-icon dot-orange"></div>
            <div><div class="item-name">${a.skill}</div><div class="item-desc">${a.description || a.reason || ''}</div></div>
          </div>`).join('')}
      </div>`;
  }
}

function renderBio(bio) {
  const r = document.getElementById('results');
  r.innerHTML = `
    <div class="bio-result">
      <div class="bio-label">Generated Bio</div>
      ${bio}
    </div>`;
}

function showError(data) {
  document.getElementById('results').innerHTML = `
    <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;font-size:12px;color:#b91c1c;white-space:pre-wrap;font-family:monospace">
      ${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}
    </div>`;
}
</script>
</body>
</html>
