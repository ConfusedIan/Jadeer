<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jadeer — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 400px;
    }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand h1 { font-size: 30px; font-weight: 800; color: #4f46e5; letter-spacing: -0.5px; }
    .brand p { font-size: 14px; color: #64748b; margin-top: 4px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #475569; margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 12px;
      border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.08); }
    .btn {
      width: 100%; padding: 11px;
      background: #4f46e5; color: white;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      margin-top: 6px; transition: background 0.1s;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-outline {
      width: 100%; padding: 10px;
      background: white; color: #374151;
      border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      margin-top: 8px; transition: all 0.1s;
    }
    .btn-outline:hover { border-color: #4f46e5; color: #4f46e5; background: #f5f3ff; }
    .error {
      background: #fef2f2; color: #dc2626;
      border-radius: 8px; padding: 10px 12px;
      font-size: 13px; margin-top: 10px; display: none;
    }
    .divider {
      text-align: center; font-size: 12px; color: #94a3b8;
      margin: 18px 0; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 42%; height: 1px; background: #e2e8f0;
    }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .config-note { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 14px; }
    .config-note a { color: #4f46e5; cursor: pointer; }
    .section { display: none; }
    .section.active { display: block; }
    .back-link { font-size: 12px; color: #64748b; cursor: pointer; display: block; margin-top: 10px; text-align: center; }
    .back-link:hover { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <h1>Jadeer</h1>
      <p>Professional career platform</p>
    </div>

    <!-- Login section -->
    <div id="loginSection" class="section active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
      </div>
      <button class="btn" id="loginBtn" onclick="login()">Sign In</button>
      <div class="error" id="loginError"></div>
      <div class="divider">or</div>
      <button class="btn-outline" onclick="show('tokenSection')">Paste JWT directly</button>
      <div class="config-note"><a onclick="show('configSection')">Configure Supabase credentials</a></div>
    </div>

    <!-- Config section -->
    <div id="configSection" class="section">
      <p style="font-size:13px;color:#64748b;margin-bottom:16px">
        Enter your Supabase project credentials. Find these in your Supabase dashboard under Project Settings → API.
      </p>
      <div class="form-group">
        <label>Supabase URL</label>
        <input type="text" id="cfgUrl" placeholder="https://xxx.supabase.co" />
      </div>
      <div class="form-group">
        <label>Anon / Public Key</label>
        <input type="text" id="cfgKey" placeholder="eyJ..." />
      </div>
      <button class="btn" onclick="saveConfig()">Save</button>
      <span class="back-link" onclick="show('loginSection')">← Back to sign in</span>
    </div>

    <!-- Token paste section -->
    <div id="tokenSection" class="section">
      <div class="form-group">
        <label>Bearer Token (JWT)</label>
        <input type="text" id="devToken" placeholder="eyJ..." />
      </div>
      <button class="btn" onclick="useToken()">Continue</button>
      <span class="back-link" onclick="show('loginSection')">← Back to sign in</span>
    </div>
  </div>

  <script>
    let sb = null;

    function show(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function initSupabase() {
      const url = localStorage.getItem('sb_url');
      const key = localStorage.getItem('sb_anon_key');
      if (url && key && window.supabase) {
        sb = window.supabase.createClient(url, key);
        return true;
      }
      return false;
    }

    window.onload = function () {
      if (localStorage.getItem('token')) {
        window.location.href = '/dev/profile.html';
        return;
      }
      initSupabase();
      const url = localStorage.getItem('sb_url');
      const key = localStorage.getItem('sb_anon_key');
      if (url) document.getElementById('cfgUrl').value = url;
      if (key) document.getElementById('cfgKey').value = key;
    };

    function saveConfig() {
      const url = document.getElementById('cfgUrl').value.trim();
      const key = document.getElementById('cfgKey').value.trim();
      if (!url || !key) return alert('Both fields are required');
      localStorage.setItem('sb_url', url);
      localStorage.setItem('sb_anon_key', key);
      initSupabase();
      show('loginSection');
    }

    async function login() {
      if (!sb) { show('configSection'); return; }
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      if (!email || !password) {
        err.textContent = 'Email and password are required';
        err.style.display = 'block'; return;
      }
      btn.disabled = true; btn.textContent = 'Signing in...'; err.style.display = 'none';
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        err.textContent = error.message; err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In'; return;
      }
      localStorage.setItem('token', data.session.access_token);
      window.location.href = '/dev/profile.html';
    }

    function useToken() {
      const t = document.getElementById('devToken').value.trim();
      if (!t) return;
      localStorage.setItem('token', t);
      window.location.href = '/dev/profile.html';
    }
  </script>
</body>
</html>
