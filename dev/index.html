<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CV Service Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #f1f5f9;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      background: #4f46e5;
      color: white;
      padding: 0 16px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar strong { font-size: 14px; white-space: nowrap; }
    .topbar input {
      flex: 1;
      max-width: 520px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-family: monospace;
      background: rgba(255,255,255,0.15);
      color: white;
    }
    .topbar input::placeholder { color: rgba(255,255,255,0.45); }
    .topbar input:focus { outline: 2px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.25); }
    #loadBtn {
      padding: 6px 14px;
      background: white;
      color: #4f46e5;
      font-weight: 700;
      font-size: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    #loadBtn:hover { background: #e0e7ff; }

    /* ── Split layout ── */
    .split {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Left: editor ── */
    .editor {
      width: 400px;
      flex-shrink: 0;
      background: white;
      border-right: 1px solid #e2e8f0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* ── Right: PDF / log ── */
    .viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .vtabs {
      display: flex;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .vtab {
      padding: 10px 18px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #64748b;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
    }
    .vtab.on { color: #4f46e5; border-bottom-color: #4f46e5; }

    .vbody { flex: 1; overflow: hidden; position: relative; }
    .vbody iframe { width: 100%; height: 100%; border: none; display: block; }
    .vbody pre {
      height: 100%;
      overflow-y: auto;
      padding: 16px;
      font-size: 11px;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      background: #0f172a;
      color: #7dd3fc;
      line-height: 1.7;
    }

    .vfooter {
      padding: 5px 14px;
      background: white;
      border-top: 1px solid #e2e8f0;
      font-size: 11px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; }
    .dot.ok   { background: #22c55e; }
    .dot.err  { background: #ef4444; }
    .dot.busy { background: #f59e0b; animation: blink .7s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #94a3b8;
      padding: 40px;
      text-align: center;
    }
    .empty .ico { font-size: 40px; }
    .empty p { font-size: 13px; line-height: 1.6; }

    /* ── Section headers inside editor ── */
    .sec-head {
      padding: 8px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #475569;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* ── Bio section ── */
    .bio-area { padding: 12px 14px; border-bottom: 1px solid #e2e8f0; }
    .bio-area textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 72px;
    }
    .bio-area textarea:focus { outline: 2px solid #4f46e5; border-color: #4f46e5; }
    .bio-kw-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .bio-kw-row input {
      flex: 1;
      padding: 6px 9px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
    }
    .bio-kw-row input:focus { outline: 2px solid #ea580c; border-color: #ea580c; }

    /* ── Item lists ── */
    .item-list { border-bottom: 1px solid #e2e8f0; }

    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #f1f5f9;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row input[type=checkbox] { margin-top: 2px; accent-color: #4f46e5; flex-shrink: 0; }

    .item-info { flex: 1; min-width: 0; }
    .item-title { font-weight: 600; font-size: 12px; }
    .item-sub { font-size: 11px; color: #64748b; margin-top: 1px; }
    .item-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 99px;
      margin-left: 6px;
    }
    .verified   { background: #dcfce7; color: #15803d; }
    .unverified { background: #f1f5f9; color: #64748b; }
    .assessed   { background: #ede9fe; color: #6d28d9; }

    .desc-toggle {
      font-size: 11px;
      color: #4f46e5;
      cursor: pointer;
      margin-top: 4px;
      display: inline-block;
    }
    .desc-edit {
      margin-top: 6px;
      display: none;
    }
    .desc-edit textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #a5b4fc;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      resize: vertical;
      min-height: 52px;
    }
    .desc-edit textarea:focus { outline: 2px solid #4f46e5; border-color: #4f46e5; }

    /* ── Options bar ── */
    .options-area { padding: 12px 14px; border-bottom: 1px solid #e2e8f0; }
    .opts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }
    .opt-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      cursor: pointer;
    }
    .opt-label input { accent-color: #4f46e5; }

    .field-row { margin-bottom: 8px; }
    .field-row label { display: block; font-size: 11px; font-weight: 600; color: #475569; margin-bottom: 3px; }
    .field-row input[type=number],
    .field-row input[type=text] {
      width: 100%;
      padding: 6px 9px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
    }

    /* ── Action bar ── */
    .action-bar {
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      position: sticky;
      bottom: 0;
      background: white;
      border-top: 1px solid #e2e8f0;
    }
    .btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { filter: brightness(0.92); }
    .btn-blue   { background: #4f46e5; color: white; }
    .btn-green  { background: #16a34a; color: white; }
    .btn-sm {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      background: #ea580c;
      color: white;
      white-space: nowrap;
    }
    .btn-sm:hover { filter: brightness(0.9); }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <strong>CV Tester</strong>
  <input type="text" id="token" placeholder="Paste your Supabase JWT here…" />
  <button id="loadBtn" onclick="loadProfile()">Load My Profile</button>
  <a href="/dev/recommendation.html" style="font-size:12px;color:rgba(255,255,255,0.7);text-decoration:none;padding:5px 10px;border-radius:5px;border:1px solid rgba(255,255,255,0.2);white-space:nowrap;">Recommendation Tester →</a>
</div>

<!-- ── Main ── -->
<div class="split">

  <!-- Left: editor (hidden until profile is loaded) -->
  <div class="editor" id="editor">
    <div class="empty" id="emptyState">
      <div class="ico">👤</div>
      <p>Paste your JWT token and click<br><strong>Load My Profile</strong> to start.</p>
    </div>
  </div>

  <!-- Right: viewer -->
  <div class="viewer">
    <div class="vtabs">
      <button class="vtab on" id="tabPdf" onclick="showTab('pdf')">PDF Preview</button>
      <button class="vtab"    id="tabLog" onclick="showTab('log')">Response Log</button>
    </div>
    <div class="vbody" id="vbody">
      <div class="empty">
        <div class="ico">📄</div>
        <p>Generated PDF will appear here.</p>
      </div>
    </div>
    <div class="vfooter">
      <div class="dot" id="dot"></div>
      <span id="statusMsg">Idle</span>
    </div>
  </div>

</div>

<script>
let profile = null; // loaded profile bundle

function tok() { return document.getElementById('token').value.trim(); }
function authH(extra = {}) {
  const h = { ...extra };
  const t = tok();
  if (t) h['Authorization'] = 'Bearer ' + t;
  return h;
}

function status(state, msg) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusMsg').textContent = msg;
}

function logOut(data) {
  const el = document.getElementById('vbody');
  el.innerHTML = '<pre>' + (typeof data === 'string' ? data : JSON.stringify(data, null, 2)) + '</pre>';
  showTab('log');
}

function showTab(name) {
  document.getElementById('tabPdf').className = 'vtab' + (name === 'pdf' ? ' on' : '');
  document.getElementById('tabLog').className = 'vtab' + (name === 'log' ? ' on' : '');
}

function showPDF(blob) {
  const url = URL.createObjectURL(blob);
  document.getElementById('vbody').innerHTML = `<iframe src="${url}"></iframe>`;
  showTab('pdf');
}

// ── Load profile ────────────────────────────────────────────────────────────
async function loadProfile() {
  if (!tok()) { alert('Paste your JWT token first.'); return; }
  status('busy', 'Loading profile…');
  try {
    const res = await fetch('/profile/me/bundle', { headers: authH() });
    const data = await res.json();
    if (!res.ok) { logOut(data); status('err', `Profile load failed ${res.status}`); return; }
    profile = data;
    renderEditor(data);
    status('ok', `Profile loaded — ${data.profile?.full_name || 'unnamed'}`);
  } catch(e) { logOut(String(e)); status('err', 'Network error'); }
}

// ── Render editor from profile data ─────────────────────────────────────────
function renderEditor(data) {
  const ed = document.getElementById('editor');
  const p = data.profile || {};
  const exps  = data.experiences || [];
  const edus  = data.education || [];
  const certs = data.certificates || [];
  const skills = data.skills || [];

  ed.innerHTML = `
    <!-- Bio -->
    <div class="sec-head">Summary / Bio</div>
    <div class="bio-area">
      <textarea id="bioText" placeholder="No bio yet — write one or generate with AI below…">${p.bio || ''}</textarea>
      <div class="bio-kw-row">
        <input type="text" id="bioKw" placeholder="Keywords: cloud, team lead… (optional)" />
        <button class="btn-sm" onclick="doGenBio()">✦ AI Generate</button>
      </div>
    </div>

    <!-- Experiences -->
    <div class="sec-head">Experience <span style="font-size:10px;font-weight:400;color:#94a3b8">${exps.length} item(s)</span></div>
    <div class="item-list" id="expList">
      ${exps.length ? exps.map((e, i) => `
        <div class="item-row">
          <input type="checkbox" id="exp_chk_${i}" checked />
          <div class="item-info">
            <div class="item-title">${e.job_title || 'Role'} — ${e.company || 'Company'}</div>
            <div class="item-sub">${e.start_date || ''} → ${e.end_date || 'Present'}</div>
            ${e.description ? `<span class="desc-toggle" onclick="toggleDesc('expDesc_${i}')">✏ Edit description</span>
            <div class="desc-edit" id="expDesc_${i}"><textarea data-exp-idx="${i}">${e.description}</textarea></div>` : ''}
          </div>
        </div>`).join('') : '<div style="padding:12px 14px;font-size:12px;color:#94a3b8">No experiences in profile.</div>'}
    </div>

    <!-- Education -->
    <div class="sec-head">Education <span style="font-size:10px;font-weight:400;color:#94a3b8">${edus.length} item(s)</span></div>
    <div class="item-list" id="eduList">
      ${edus.length ? edus.map((e, i) => `
        <div class="item-row">
          <input type="checkbox" id="edu_chk_${i}" checked />
          <div class="item-info">
            <div class="item-title">${e.degree || 'Degree'} — ${e.institution || 'Institution'}</div>
            <div class="item-sub">${e.field_of_study || ''} ${e.start_date || ''} → ${e.end_date || ''}</div>
          </div>
        </div>`).join('') : '<div style="padding:12px 14px;font-size:12px;color:#94a3b8">No education in profile.</div>'}
    </div>

    <!-- Certificates -->
    <div class="sec-head">Certificates <span style="font-size:10px;font-weight:400;color:#94a3b8">${certs.length} item(s)</span></div>
    <div class="item-list" id="certList">
      ${certs.length ? certs.map((c, i) => `
        <div class="item-row">
          <input type="checkbox" id="cert_chk_${i}" checked />
          <div class="item-info">
            <div class="item-title">
              ${c.certificate_name || 'Certificate'}
              <span class="item-badge ${c.is_verified ? 'verified' : 'unverified'}">${c.is_verified ? '✓ Verified' : '○ Not verified'}</span>
            </div>
            <div class="item-sub">${c.issuer || ''} ${c.issue_date ? '· ' + c.issue_date : ''}</div>
          </div>
        </div>`).join('') : '<div style="padding:12px 14px;font-size:12px;color:#94a3b8">No certificates in profile.</div>'}
    </div>

    <!-- Skills -->
    <div class="sec-head">Skills <span style="font-size:10px;font-weight:400;color:#94a3b8">${skills.length} item(s)</span></div>
    <div class="item-list" id="skillList">
      ${skills.length ? skills.map((s, i) => {
        const name = s.custom_skill_name || s.skill_name || s.name || 'Skill';
        const score = s.score != null ? s.score : null;
        return `
        <div class="item-row">
          <input type="checkbox" id="skill_chk_${i}" checked />
          <div class="item-info">
            <div class="item-title">
              ${name}
              ${score != null ? `<span class="item-badge ${score >= 70 ? 'assessed' : 'unverified'}">${score}/100${score >= 70 ? ' ★' : ''}</span>` : ''}
            </div>
          </div>
        </div>`;
      }).join('') : '<div style="padding:12px 14px;font-size:12px;color:#94a3b8">No skills in profile.</div>'}
    </div>

    <!-- Options -->
    <div class="sec-head">Options</div>
    <div class="options-area">
      <div class="opts-grid">
        <label class="opt-label"><input type="checkbox" id="opt_scores" checked> Show scores</label>
        <label class="opt-label"><input type="checkbox" id="opt_badges" checked> Show badges</label>
      </div>
      <div class="field-row">
        <label>★ Badge threshold (score ≥ this = assessed)</label>
        <input type="number" id="opt_thresh" value="70" min="0" max="100" />
      </div>
      <div class="field-row">
        <label><input type="checkbox" id="opt_save" style="accent-color:#4f46e5;margin-right:5px"> Save to history</label>
      </div>
      <div class="field-row">
        <label>CV name (for history)</label>
        <input type="text" id="opt_cvname" placeholder="e.g. Google Application" />
      </div>
    </div>

    <!-- Action buttons -->
    <div class="action-bar">
      <button class="btn btn-blue" onclick="doGetCV()">GET /cv/me.pdf</button>
      <button class="btn btn-green" onclick="doPostCV()">POST /cv/me.pdf</button>
    </div>
  `;
}

function toggleDesc(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

// ── AI Bio generation ────────────────────────────────────────────────────────
async function doGenBio() {
  status('busy', 'Generating bio…');
  const kw = document.getElementById('bioKw').value.split(',').map(k => k.trim()).filter(Boolean);
  try {
    const res = await fetch('/recommendation/generate-bio', {
      method: 'POST',
      headers: authH({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ keywords: kw }),
    });
    const data = await res.json();
    if (!res.ok) { logOut(data); status('err', `Error ${res.status}`); return; }
    document.getElementById('bioText').value = data.bio || '';
    status('ok', 'Bio generated — edit if needed, then generate PDF');
  } catch(e) { logOut(String(e)); status('err', 'Network error'); }
}

// ── Collect which items are checked ─────────────────────────────────────────
function checkedIndices(prefix, count) {
  const on = [];
  for (let i = 0; i < count; i++) {
    const el = document.getElementById(`${prefix}_${i}`);
    if (el && el.checked) on.push(i);
  }
  return on;
}

function getExpOverrides() {
  const overrides = {};
  document.querySelectorAll('[data-exp-idx]').forEach(ta => {
    const idx = parseInt(ta.getAttribute('data-exp-idx'));
    const orig = (profile?.experiences?.[idx]?.description) || '';
    if (ta.value.trim() !== orig.trim()) overrides[idx] = ta.value.trim();
  });
  return Object.keys(overrides).length ? overrides : null;
}

// ── GET /cv/me.pdf ───────────────────────────────────────────────────────────
async function doGetCV() {
  if (!profile) { alert('Load your profile first.'); return; }
  status('busy', 'Generating CV…');
  const exps  = profile.experiences || [];
  const edus  = profile.education || [];
  const certs = profile.certificates || [];
  const skills = profile.skills || [];

  const p = new URLSearchParams({
    include_experience:      checkedIndices('exp_chk',   exps.length).length > 0,
    include_education:       checkedIndices('edu_chk',   edus.length).length > 0,
    include_certificates:    checkedIndices('cert_chk',  certs.length).length > 0,
    include_skills:          checkedIndices('skill_chk', skills.length).length > 0,
    include_scores:          document.getElementById('opt_scores').checked,
    include_verified_badges: document.getElementById('opt_badges').checked,
  });
  try {
    const res = await fetch('/cv/me.pdf?' + p, { headers: authH() });
    if (!res.ok) { logOut(await res.json()); status('err', `Error ${res.status}`); return; }
    showPDF(await res.blob());
    status('ok', 'GET /cv/me.pdf — 200 OK');
  } catch(e) { logOut(String(e)); status('err', 'Network error'); }
}

// ── POST /cv/me.pdf ──────────────────────────────────────────────────────────
async function doPostCV() {
  if (!profile) { alert('Load your profile first.'); return; }
  status('busy', 'Generating CV…');

  const exps   = profile.experiences || [];
  const edus   = profile.education || [];
  const certs  = profile.certificates || [];
  const skills = profile.skills || [];

  const body = {
    include_experience:      checkedIndices('exp_chk',   exps.length).length > 0,
    include_education:       checkedIndices('edu_chk',   edus.length).length > 0,
    include_certificates:    checkedIndices('cert_chk',  certs.length).length > 0,
    include_skills:          checkedIndices('skill_chk', skills.length).length > 0,
    include_scores:          document.getElementById('opt_scores').checked,
    include_verified_badges: document.getElementById('opt_badges').checked,
    skill_threshold:         parseFloat(document.getElementById('opt_thresh').value) || 70,
    save_to_history:         document.getElementById('opt_save').checked,
  };

  const bio = document.getElementById('bioText')?.value?.trim();
  if (bio && bio !== (profile.profile?.bio || '')) body.custom_bio = bio;

  const overrides = getExpOverrides();
  if (overrides) body.experience_overrides = overrides;

  const name = document.getElementById('opt_cvname')?.value?.trim();
  if (name) body.cv_name = name;

  logOut(body); // show request body in log

  try {
    const res = await fetch('/cv/me.pdf', {
      method: 'POST',
      headers: authH({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body),
    });
    if (!res.ok) { logOut(await res.json()); status('err', `Error ${res.status}`); return; }
    showPDF(await res.blob());
    status('ok', `POST /cv/me.pdf — 200 OK${body.save_to_history ? ' · saved to history' : ''}`);
  } catch(e) { logOut(String(e)); status('err', 'Network error'); }
}
</script>
</body>
</html>
